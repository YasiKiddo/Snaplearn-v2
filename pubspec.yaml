name: snaplearn
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  http: ^1.2.2

  file_picker: 11.0.2
  video_player:
  chewie: 1.8.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/photos/
    - assets/videos/
    - assets/icons/zap.png
    - assets/icons/circle-play.png
    - assets/icons/timer.png


